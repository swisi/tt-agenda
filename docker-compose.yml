version: '3.8'

services:
  web:
    image: ghcr.io/swisi/tt-agenda:latest
    container_name: tt-agenda
    ports:
      - "8085:5000"
    volumes:
      - tt-agenda:/app/instance
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=INFO
      - WEBHOOK_ENABLED=true
      - WEBHOOK_URL=https://n8n.3624.ch/webhook/messaging
      - TZ=Europe/Zurich
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tt-agenda:
    driver: local